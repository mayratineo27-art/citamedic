<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P-01 — Login · CITAMEDIC</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="_base.css">
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main); padding: 2rem; }
  .login-card { background: white; border-radius: 28px; border: 1px solid var(--border); box-shadow: var(--shadow-lg); padding: 2.5rem 2.25rem; width: 100%; max-width: 420px; }
  .login-header { text-align: center; margin-bottom: 2rem; }
  .login-logo { width: 64px; height: 64px; background: var(--teal); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
  .login-logo i { color: white; font-size: 1.75rem; }
  .login-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.75rem; color: var(--navy); }
  .login-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .links-section { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
  .link-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem; border-radius: 10px; font-size: 0.875rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
  .link-btn-primary { color: var(--teal); background: var(--teal-light); }
  .link-btn-primary:hover { background: #d1f0e8; }
  .link-btn-secondary { color: var(--text-muted); background: #f8fafc; }
  .link-btn-secondary:hover { color: var(--navy); background: #f1f5f9; }
  .state-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .state-tab { flex: 1; padding: 0.5rem; border: 1.5px solid var(--border); border-radius: 10px; background: white; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; text-align: center; }
  .state-tab.active { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
  .state-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.75rem; }
  .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; background: none; border: none; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="proto-nav" style="position:fixed;top:0;left:0;right:0;z-index:100;">
  <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Índice</a>
  <span>/</span>
  <span>P-01 — Login</span>
  <span style="margin-left:auto;color:var(--text-muted);font-size:0.75rem;">RF01 · Todos los roles</span>
</div>

<div style="margin-top:3rem;width:100%;max-width:420px;">
  <div class="state-label">Estado del prototipo:</div>
  <div class="state-tabs">
    <div class="state-tab active" onclick="showState('normal',this)">Normal</div>
    <div class="state-tab" onclick="showState('error',this)">Error credenciales</div>
    <div class="state-tab" onclick="showState('inactivo',this)">Cuenta inactiva</div>
  </div>
</div>

<div class="login-card">
  <div class="login-header">
    <div class="login-logo"><i class="fa-solid fa-plus"></i></div>
    <div class="login-title">Bienvenido</div>
    <div class="login-subtitle">Posta Los Licenciados</div>
  </div>

  <!-- Estado: error -->
  <div id="alert-error" class="alert alert-danger" style="display:none;">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span>Credenciales inválidas. Verifica tu DNI y contraseña.</span>
  </div>

  <!-- Estado: inactivo -->
  <div id="alert-inactivo" class="alert alert-warning" style="display:none;">
    <i class="fa-solid fa-triangle-exclamation"></i>
    <span>Cuenta no habilitada. Contacte a Admisión.</span>
  </div>

  <div class="form-group">
    <label class="form-label">DNI</label>
    <div class="input-group">
      <i class="fa-solid fa-id-card input-icon"></i>
      <input type="text" class="form-control" placeholder="Ingresa tu DNI" maxlength="8">
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <div class="input-group" style="position:relative;">
      <i class="fa-solid fa-lock input-icon"></i>
      <input type="password" class="form-control" id="pwd-input" placeholder="Ingresa tu contraseña" style="padding-right:3rem;">
      <button class="password-toggle" onclick="togglePwd()"><i class="fa-regular fa-eye" id="pwd-icon"></i></button>
    </div>
  </div>

  <button class="btn-premium btn-full" style="margin-top:0.5rem;">
    <i class="fa-solid fa-right-to-bracket"></i> Ingresar
  </button>

  <hr class="divider">

  <div class="links-section">
    <a href="p02-activar-cuenta.html" class="link-btn link-btn-primary">
      <i class="fa-solid fa-user-plus"></i> Activar cuenta
    </a>
    <a href="p02-activar-cuenta.html" class="link-btn link-btn-secondary">
      <i class="fa-solid fa-key"></i> ¿Olvidaste tu contraseña?
    </a>
  </div>
</div>

<script>
function showState(state, tab) {
  document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('alert-error').style.display = 'none';
  document.getElementById('alert-inactivo').style.display = 'none';
  if (state === 'error') document.getElementById('alert-error').style.display = 'flex';
  if (state === 'inactivo') document.getElementById('alert-inactivo').style.display = 'flex';
}
function togglePwd() {
  const input = document.getElementById('pwd-input');
  const icon = document.getElementById('pwd-icon');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'fa-regular fa-eye-slash'; }
  else { input.type = 'password'; icon.className = 'fa-regular fa-eye'; }
}
</script>
</body>
</html>
